<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LoopTrauma - Sala Boss</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #endScreen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      color: #d4af37;
      text-align: center;
      pointer-events: all;
    }
    #endScreen.show { display: flex; }

    #endTitle {
      font-size: 3.5em;
      font-weight: 900;
      letter-spacing: 8px;
    }

    #endBtn {
      margin-top: 48px;
      padding: 14px 48px;
      border: 1px solid #d4af37;
      background: transparent;
      color: #d4af37;
      font-family: 'Cinzel', serif;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- END SCREEN -->
<div id="endScreen">
  <div id="endTitle">HAS MORT</div>
  <div id="endSub">EL FOC S'APAGA</div>
  <button id="endBtn">TORNAR A INTENTAR</button>
</div>

<a-scene>

  <a-entity id="player">
    <a-camera id="mainCam"></a-camera>
  </a-entity>

  <a-entity id="boss" boss-logic></a-entity>

</a-scene>

<script>
/* =========================
   VARIABLES
========================= */
let bossHP      = 100;
let playerHP    = 3;
let isInvincible = false;
let bossAlive   = true;

const MAX_PLAYER_HP = 3;

const endScreen = document.getElementById("endScreen");
const endTitle  = document.getElementById("endTitle");
const endSub    = document.getElementById("endSub");
const endBtn    = document.getElementById("endBtn");

/* =========================
   BOTÓN DINÁMICO
========================= */
endBtn.addEventListener("click", () => {
  if (!bossAlive && bossHP <= 0) {
    window.location.href = "Bosque.html"; // 👉 IR AL BOSQUE
  } else {
    location.reload(); // 👉 REINTENTAR
  }
});

/* =========================
   BOSS LOGIC
========================= */
AFRAME.registerComponent('boss-logic', {
  tick: function (t, dt) {
    if (!bossAlive) return;

    bossHP -= 0.05;

    if (bossHP <= 0) {
      bossHP = 0;
      this.onBossDie();
    }
  },

  onBossDie: function () {
    bossAlive = false;

    setTimeout(() => {
      endTitle.textContent = "VICTÒRIA";
      endSub.textContent   = "EL FOC CREMA DE NOU";
      endBtn.textContent   = "CONTINUAR"; // 🔥 CAMBIO
      endScreen.classList.add('show');
    }, 1000);
  }
});

/* =========================
   DAMAGE
========================= */
function takeDamage() {
  if (isInvincible || !bossAlive) return;

  playerHP--;
  isInvincible = true;

  if (playerHP <= 0) {
    setTimeout(() => {
      endTitle.textContent = "HAS MORT";
      endSub.textContent   = "EL FOC S'APAGA";
      endBtn.textContent   = "TORNAR A INTENTAR";
      endScreen.classList.add('show');
    }, 200);
  } else {
    setTimeout(() => { isInvincible = false; }, 700);
  }
}
</script>

</body>
</html>
