<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sala Jefe</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #ui {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      width: 350px; text-align: center; color: white; font-family: 'Arial Black', sans-serif; z-index: 10;
    }
    .bar-bg { width: 100%; height: 15px; border: 2px solid #ff0000; background: #200; margin-bottom: 5px; box-shadow: 0 0 15px #ff0000; }
    #healthBar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff0000, #990000); transition: width 0.1s; }
    #playerLife { font-size: 2.2em; color: #ff4444; text-shadow: 0 0 15px red; letter-spacing: 5px; }
    #modeText { color: #fff; font-size: 0.9em; margin-top: 5px; text-transform: uppercase; background: rgba(255,0,0,0.2); }
    #fadeOverlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: black;
      z-index: 99999; opacity: 0; transition: opacity 2s ease; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="fadeOverlay"></div>

<div id="ui">
  <div id="playerLife">❤️ ❤️ ❤️</div>
  <div class="bar-bg"><div id="healthBar"></div></div>
  <div id="modeText">FASE: ANIQUILACIÓ</div>
</div>

<a-scene renderer="colorManagement: true; lightingDataRestriction: false;">

  <a-assets>
    <a-asset-item id="modeloArena" src="modelos/londo_exterior.glb"></a-asset-item>
    <a-asset-item id="bossGlb"     src="modelos/boos.glb"></a-asset-item>
  </a-assets>

  <a-light type="ambient"     color="#4a5a7a" intensity="0.6"></a-light>
  <a-light type="directional" color="#6a80b0" intensity="0.35" position="-1 10 3"></a-light>
  <a-light type="point" color="#ff2200" intensity="2.5" distance="40" position="-555 158 255"></a-light>

  <a-sky color="#060d1a"></a-sky>

  <!-- Jugador enfront del boss -->
  <a-entity id="player" position="-530 144 255" rotation="0 90 0">
    <a-camera id="mainCam" wasd-controls="acceleration: 100" look-controls></a-camera>
  </a-entity>

  <!-- Escenari arena -->
  <a-entity gltf-model="#modeloArena"
    position="-2550 -1430.4 -5525"
    rotation="0 90 0"
    scale="10 10 10">
  </a-entity>

  <!-- Boss — model glb amb la lògica de bullet hell -->
  <a-entity id="boss"
    gltf-model="#bossGlb"
    position="-555 142.5 255"
    rotation="0 270 0"
    scale="3 3 3"
    boss-logic>
  </a-entity>

</a-scene>

<script>
let bossHP      = 100;
let playerHP    = 3;
let isInvincible = false;
let attackMode  = 0;

const healthBarEl  = document.getElementById("healthBar");
const playerLifeEl = document.getElementById("playerLife");
const modeTextEl   = document.getElementById("modeText");
const fadeOverlay  = document.getElementById("fadeOverlay");

// Fade d'entrada
fadeOverlay.style.display = "block";
fadeOverlay.style.opacity = "1";
fadeOverlay.getBoundingClientRect();
setTimeout(() => {
  fadeOverlay.style.opacity = "0";
  setTimeout(() => { fadeOverlay.style.display = "none"; }, 2000);
}, 300);

// ─── BOSS LOGIC ─────────────────────────────────────────────────────────────
AFRAME.registerComponent('boss-logic', {
  init: function () {
    this.timer      = 0;
    this.phaseTimer = 0;
    this.angleOffset = 0;
    this.dir        = 1;
    // Posició base del boss
    this.baseX = this.el.object3D.position.x;
    this.baseZ = this.el.object3D.position.z;
  },

  tick: function (t, dt) {
    if (bossHP <= 0 || playerHP <= 0) return;

    this.timer      += dt;
    this.phaseTimer += dt;

    // Moviment lateral del boss al llarg de l'eix X (arena)
    const pos = this.el.object3D.position;
    pos.z += this.dir * 0.06;
    if (Math.abs(pos.z - this.baseZ) > 8) this.dir *= -1;

    // Rotació suau del model
    this.el.object3D.rotation.y += 0.005;

    // Canviar fase cada 4 s
    if (this.phaseTimer > 4000) {
      attackMode = (attackMode + 1) % 5;
      this.phaseTimer = 0;
      const noms = ["ANELLS DOBLES", "ASPES CREUADES", "CAÇA PESADA", "PLUJA DE CAOS", "MUR TOTAL"];
      modeTextEl.textContent = "FASE: " + noms[attackMode];
    }

    // Freqüència de disparament per fase
    const fireRate = attackMode === 1 ? 80 : 450;
    if (this.timer > fireRate) {
      this.executeAttack();
      this.timer = 0;
    }

    // Vida del boss baixa sola (demo)
    if (bossHP > 0) {
      bossHP -= 0.05;
      healthBarEl.style.width = bossHP + "%";
      if (bossHP <= 0) bossDefeated();
    }
  },

  executeAttack: function () {
    const camEl  = document.getElementById("mainCam");
    const pPos   = new THREE.Vector3();
    camEl.object3D.getWorldPosition(pPos);
    const bPos   = this.el.object3D.position;
    const toPlayer = Math.atan2(pPos.x - bPos.x, pPos.z - bPos.z);

    switch (attackMode) {
      case 0: // Anells dobles
        this.shootRing(14, 0.2, "#ff0055");
        break;
      case 1: // Aspes creuades
        this.angleOffset += 0.6;
        this.createBullet(this.angleOffset,  0.25, "#00ffff");
        this.createBullet(-this.angleOffset, 0.25, "#00ffff");
        break;
      case 2: // Ventall al jugador
        for (let i = -2; i <= 2; i++)
          this.createBullet(toPlayer + (i * 0.2), 0.3, "#ffeb3b");
        break;
      case 3: // Laterals que tanquen
        this.createBullet(toPlayer + 1.5, 0.2, "#ffffff");
        this.createBullet(toPlayer - 1.5, 0.2, "#ffffff");
        break;
      case 4: // Mur
        for (let i = 0; i < 8; i++)
          this.createBullet((i * 0.4) + toPlayer - 1.5, 0.15, "#ff5722");
        break;
    }
  },

  shootRing: function (count, speed, color) {
    for (let i = 0; i < count; i++)
      this.createBullet(i * (Math.PI * 2 / count), speed, color);
  },

  createBullet: function (angle, speed, color) {
    const bullet = document.createElement('a-sphere');
    bullet.setAttribute('radius', 0.45);
    bullet.setAttribute('color', color);
    bullet.setAttribute('material', 'emissive:' + color + '; emissiveIntensity: 2');
    bullet.setAttribute('position', {
      x: this.el.object3D.position.x,
      y: this.el.object3D.position.y + 1,
      z: this.el.object3D.position.z
    });
    bullet.setAttribute('bullet-move', { vx: Math.sin(angle) * speed, vz: Math.cos(angle) * speed });
    this.el.sceneEl.appendChild(bullet);
  }
});

// ─── BULLET MOVE ─────────────────────────────────────────────────────────────
AFRAME.registerComponent('bullet-move', {
  schema: { vx: { type: 'number' }, vz: { type: 'number' } },
  init: function () {
    this.pVec = new THREE.Vector3();
    this.bVec = new THREE.Vector3();
    this.camEl = document.getElementById("mainCam");
  },
  tick: function (time, dt) {
    const pos = this.el.object3D.position;
    pos.x += this.data.vx * (dt / 16);
    pos.z += this.data.vz * (dt / 16);

    this.camEl.object3D.getWorldPosition(this.pVec);
    this.el.object3D.getWorldPosition(this.bVec);

    const distXZ = Math.sqrt(
      Math.pow(this.pVec.x - this.bVec.x, 2) +
      Math.pow(this.pVec.z - this.bVec.z, 2)
    );

    if (distXZ < 0.85 && !isInvincible && Math.abs(this.pVec.y - this.bVec.y) < 1.3) {
      takeDamage();
    }
    if (this.bVec.distanceTo(this.pVec) > 60) {
      if (this.el.parentNode) this.el.parentNode.removeChild(this.el);
    }
  }
});

// ─── DANY AL JUGADOR ─────────────────────────────────────────────────────────
function takeDamage() {
  if (isInvincible) return;
  playerHP--;
  isInvincible = true;

  let hearts = "";
  for (let i = 0; i < playerHP; i++) hearts += "❤️ ";
  playerLifeEl.textContent = hearts || "MORT";

  document.body.style.filter = "contrast(200%) brightness(50%) sepia(100%) hue-rotate(-50deg)";
  setTimeout(() => { document.body.style.filter = "none"; }, 150);

  if (playerHP <= 0) {
    setTimeout(() => {
      fadeOverlay.style.display = "block";
      fadeOverlay.style.opacity = "0";
      fadeOverlay.getBoundingClientRect();
      fadeOverlay.style.opacity = "1";
      setTimeout(() => { location.reload(); }, 2000);
    }, 300);
  } else {
    setTimeout(() => { isInvincible = false; }, 600);
  }
}

// ─── BOSS DERROTAT ────────────────────────────────────────────────────────────
function bossDefeated() {
  modeTextEl.textContent = "BOSS DERROTAT!";
  modeTextEl.style.color = "#00FF88";
  healthBarEl.style.width = "0%";
}
</script>

</body>
</html>
