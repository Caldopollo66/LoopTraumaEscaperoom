<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- A-Frame 2-->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Physics -->
  <<script src="https://cdn.rawgit.com/donmccurdy/aframe-extras/v3.8.6/dist/aframe-extras.min.js"></script>
</head>

<body>

<a-scene physics="debug: false">

  <!-- ASSETS -->
  <a-assets>
    <img id="noche" src="IMG/noche.jpeg">
    <a-asset-item id="carreteraModel" src="modelos/mountain_road_scene.glb"></a-asset-item>
    <a-asset-item id="CotxeModel" src="modelos/coxe.glb"> </a-asset-item>
  </a-assets>

  <!-- JUGADOR MÁS PEQUEÑO Y MÁS LENTO -->
  <a-entity
    id="jugador" camera
    universal-controls
    kinematic-body
    position="-23 -50 -49.100">
    </a-entity>

    <a-camera position="0 0 0" look-controls></a-camera>

    <a-camera look-controls></a-camera>
  </a-entity>

  <!-- CIELO -->
  <a-sky src="#noche"></a-sky>

  <!-- CARRETERA MÁS GRANDE -->
  <a-entity 
    gltf-model="#carreteraModel"
    position="24 -67.400 53"
    scale="20 20 20"
    static-body>
  </a-entity>

</a-scene>

</body>
</html>
