<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- A-Frame 2-->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Physics -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
</head>

<body>

<a-scene physics="debug: false">

  <!-- ASSETS -->
  <a-assets>
    <img id="noche" src="IMG/noche.jpeg">
    <a-asset-item id="carreteraModel" src="modelos/mountain_road_scene.glb"></a-asset-item>
    <a-asset-item id="CotxeModel" src="modelos/coxe.glb"> </a-asset-item>
  </a-assets>

  <!-- JUGADOR MÁS PEQUEÑO Y MÁS LENTO -->
  <a-entity
    id="player"
    position="0 1 5"
    scale="0.7 0.7 0.7"
    movement-controls="speed: 2"
    dynamic-body="mass: 1">
    <a-camera look-controls></a-camera>
  </a-entity>

  <!-- CIELO -->
  <a-sky src="#noche"></a-sky>

  <!-- CARRETERA MÁS GRANDE -->
  <a-entity 
    gltf-model="#carreteraModel"
    position="0 0 0"
    scale="20 20 20"
    static-body>
  </a-entity>

</a-scene>

</body>
</html>
