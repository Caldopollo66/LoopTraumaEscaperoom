<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sala Experimental</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>

<a-scene background="color: #FFFFFF">

  <!-- ================= CARGA DE RECURSOS ================= -->
  <a-assets>
    <img id="lolbanana" src="IMG/banana.png">
    <a-asset-item id="modeloBoton" src="modelos/boton.glb"></a-asset-item>
    <a-asset-item id="londo" src="modelos/anor_londo.glb"></a-asset-item>
  </a-assets>

  <!-- ================= JUGADOR ================= -->
  <a-entity id="player" position="0 1.6 6">
    <a-camera wasd-controls look-controls>
      <a-cursor color="red"></a-cursor>
    </a-camera>
  </a-entity>
 
  <!-- ================= PIZARRA ================= -->

  <a-plane id="panel"
           position="0 15 -14.9"
           width="26"
           height="5.5"
           color="#000000">
    
    <a-entity id="texto"
      position="0 0 0.1"
      text="value: Bienvenido al experimento.\n\nPulsa el botón 3D.; 
            align: center; 
            width: 24;
            color: white;">
    </a-entity>

  </a-plane>

  <!-- ================= BANANA DETRÁS ================= -->

  <a-plane 
      src="#lolbanana"
      position="0 5 -10"
      rotation="0 180 0"
      width="6"
      height="4">
  </a-plane>

  <!-- ================= BOTÓN 3D (GLB) RECTO ================= -->

  <a-entity id="portal"
            gltf-model="#modeloBoton"
            position="0 -4 -5"
            rotation="0 90 0"
            scale="10 10 10"
            class="clickable">
  </a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>
  <!--==================Anorlondo============== -->
  <a-entity 
      gltf-model="#londo"
            position="0 -4 -5"
            rotation="0 90 0"
            scale="10 10 10">
          </a-entity>
  <!-- ================= SCRIPT ================= -->

 <script>
    const textos = [
      "En Jack es troba en una carretera, després d'haver voltat per un bosc a la nit.",
      "Està completament embriagat per l’alcohol després de sortir d’un bar.",
      "Es troba a punt de decidir com acabar amb tot",
      "Però... serà aquest el final?",
      "Es pregunta si el seu patiment mereix seguir endavant?",  
      " O si només és un ser menyspreable més.",
      "Al cap i a la fi, hi ha destins que són molt pitjors que la mort."
      ];
    let indice = 0;

    const texto = document.querySelector("#texto");
    const portal = document.querySelector("#portal");

    // Click en el modelo GLB para avanzar el texto
    portal.addEventListener("click", function () {
      if (indice < textos.length) {
        texto.setAttribute("text", "value", textos[indice]);

        // Último texto en rojo
        if (indice === textos.length - 1) {
          texto.setAttribute("text", "color", "red");
        }

        indice++;
      }
    });
  </script>

</a-scene>

</body>
</html>
