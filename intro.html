<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sala Experimental</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>

<a-scene background="color: #FFFFFF">

  <!-- ================= CARGA DE RECURSOS ================= -->
  <a-assets>
    <img id="lolbanana" src="IMG/banana.png">
    <a-asset-item id="modeloBoton" src="modelos/boton.glb"></a-asset-item>
  </a-assets>

  <!-- ================= JUGADOR ================= -->
  <a-entity id="player" position="0 1.6 6">
    <a-camera wasd-controls look-controls>
      <a-cursor color="black"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ================= CAJA ================= -->

  <!-- Suelo gris -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#AAAAAA"></a-plane>

  <!-- Paredes grises -->
  <a-plane position="0 3 -15" width="30" height="6" color="#AAAAAA"></a-plane>
  <a-plane position="0 3 15" rotation="0 180 0" width="30" height="6" color="#AAAAAA"></a-plane>
  <a-plane position="-15 3 0" rotation="0 90 0" width="30" height="6" color="#AAAAAA"></a-plane>
  <a-plane position="15 3 0" rotation="0 -90 0" width="30" height="6" color="#AAAAAA"></a-plane>

  <!-- ================= PIZARRA ================= -->

  <a-plane id="panel"
           position="0 15 -14.9"
           width="26"
           height="5.5"
           color="#000000">
    
    <a-entity id="texto"
      position="0 0 0.1"
      text="value: Bienvenido al experimento.\n\nPulsa el botón 3D.; 
            align: center; 
            width: 24;
            color: white;">
    </a-entity>

  </a-plane>

  <!-- ================= BANANA DETRÁS ================= -->

  <a-plane 
      src="#lolbanana"
      position="0 2 12"
      rotation="0 180 0"
      width="6"
      height="4">
  </a-plane>

  <!-- ================= BOTÓN 3D (GLB) RECTO ================= -->

  <a-entity id="portal"
            gltf-model="#modeloBoton"
            position="0 -5 -5"
            rotation="0 90 0"
            scale="10 10 10"
            class="clickable">
  </a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>

  <!-- ================= SCRIPT ================= -->

  <script>
    const textos = [
      "Esta habitación no tiene puertas.",
      "Las paredes observan cada movimiento.",
      "No estás aquí por accidente.",
      "El sistema está evaluando.",
      "NO HAY SALIDA."
    ];

    let indice = 0;

    const texto = document.querySelector("#texto");
    const portal = document.querySelector("#portal");

    // Click en el modelo GLB para avanzar el texto
    portal.addEventListener("click", function () {
      if (indice < textos.length) {
        texto.setAttribute("text", "value", textos[indice]);

        // Último texto en rojo
        if (indice === textos.length - 1) {
          texto.setAttribute("text", "color", "red");
        }

        indice++;
      }
    });
  </script>

</a-scene>

</body>
</html>
