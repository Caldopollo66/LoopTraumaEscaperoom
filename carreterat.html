<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

  <!-- A-Frame 2-->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Physics -->

<script src="https://agarci9inscastellet.github.io/scaperoom/js/scaperoom.js"> </script>
</head>
<script>
document.addEventListener('DOMContentLoaded', () => {

  const nextLevelObjects = document.querySelectorAll('.next-level');

  nextLevelObjects.forEach(object => {
   object.addEventListener('click', function () {
  window.location.href = "intro.html";
    });
  });

});
</script>
<body>

<a-scene physics="debug: false">

  <!-- ASSETS -->
  <a-assets>
    <img id="noche" src="IMG/noche.jpeg">
    <a-asset-item id="carreteraModel" src="modelos/mountain_road_scene.glb"></a-asset-item>
    <a-asset-item id="Cotxe" src="modelos/coxe.glb"> </a-asset-item>
    <a-asset-item id="alcol" src="modelos/alcol.glb"> </a-asset-item>
    <a-asset-item id="jagger" src="modelos/jagger.glb"> </a-asset-item>
    <a-asset-item id="rope" src="modelos/rope.glb"> </a-asset-item>
    <img id="sonrisa" src="IMG/sonrisa.jpg">
  </a-assets>

  <!-- JUGADOR MÁS PEQUEÑO Y MÁS LENTO -->
<a-entity id="player" position="0.050 -0.002 -0.229" rotation="0 180 0">
<a-camera   wasd-controls="acceleration: 2" look-controls>
<a-cursor color="red"></a-cursor>
</a-camera>
</a-entity>

  <!-- CIELO -->
  <a-sky src="#noche"></a-sky>
  <a-entity
  class="next-level"
    gltf-model="#Cotxe"
    position="3.50 1.438 6.110"
    scale="0.07 0.07 0.07"
    rotation="0 210 0"
    static-body
    animation="property: position; to: 0.482 1.438 0.713; dur: 10000; easing: linear;">
  </a-entity> 

  <!-- CARRETERA MÁS GRANDE -->
  <a-entity 
    gltf-model="#carreteraModel"
    position="24 -67.100 53"
    scale="20 20 20"
    static-body>
  </a-entity> 
  <!-- Botellas alchol-->
  <a-entity 
    gltf-model="#alcol"
    position="-0.960 1.448 -1.013"
    scale="0.005 0.005 0.005"
    static-body>
  </a-entity>
  <!-- Jägermeister-->
<a-entity
class="next-level"
id="btnjagger"
    gltf-model="#jagger"
    position="-0.960 1.448 -1.013"
    scale="0.095 0.095 0.095"
    static-body>
</a-entity> 
  <!-- Cuerda-->
<a-entity
class="next-leve"
    gltf-model="#rope"
    position="-0.375 2.132 2.527"
    scale="0.005 0.005 0.005"
    static-body>
</a-entity>
 <a-plane 
 id="btnsonrisa"
      src="#sonrisa"
      position="-9.045 2.132 -2.030"
      rotation="0 90 0"
      scale="0.500 0.500 0.500"
      width="6"
      height="4">
  </a-plane>
 
  <!-- CARRETERA MÁS GRANDE -->
  <a-entity 
    gltf-model="#carreteraModel"
    position="24 -67.100 53"
    scale="20 20 20"
    static-body>
</a-scene>

<script>
  questionGate("#btnsonrisa", 0, "intro.html");
</script>
</body>
</html>
