<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bullet Hell - APOCALIPSIS GIGANTE</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #ui {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      width: 350px; text-align: center; color: white; font-family: 'Arial Black', sans-serif; z-index: 10;
    }
    .bar-bg { width: 100%; height: 15px; border: 2px solid #ff0000; background: #200; margin-bottom: 5px; box-shadow: 0 0 15px #ff0000; }
    #healthBar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff0000, #990000); transition: width 0.1s; }
    #playerLife { font-size: 2.2em; color: #ff4444; text-shadow: 0 0 15px red; letter-spacing: 5px; }
    #modeText { color: #fff; font-size: 0.9em; margin-top: 5px; text-transform: uppercase; background: rgba(255,0,0,0.2); }
  </style>
</head>
<body>

<div id="ui">
  <div id="playerLife">❤️ ❤️ ❤️</div>
  <div class="bar-bg"><div id="healthBar"></div></div>
  <div id="modeText">FASE: ANIQUILACIÓN</div>
</div>

<a-scene background="color: #080000" fog="type: linear; color: #080000; near: 5; far: 25">
  <a-light type="ambient" color="#333"></a-light>
  <a-light type="point" position="0 5 0" intensity="2" color="#ff0000"></a-light>

  <a-entity id="player" position="0 0 7">
    <a-camera id="mainCam" wasd-controls="acceleration: 100" look-controls></a-camera>
  </a-entity>

  <a-box id="boss" position="0 1.1 -15" scale="3 3 3" color="#ff0000" boss-logic>
    <a-box scale="1.1 1.1 1.1" color="#fff" wireframe="true" animation="property: rotation; to: 360 360 0; dur: 3000; loop: true; easing: linear"></a-box>
  </a-box>
  
  <a-grid material="opacity: 0.3; color: #ff0000; wireframe: true"></a-grid>
</a-scene>

<script>
let bossHP = 100;
let playerHP = 3;
let isInvincible = false;
let attackMode = 0;

const healthBarEl = document.getElementById("healthBar");
const playerLifeEl = document.getElementById("playerLife");
const modeTextEl = document.getElementById("modeText");
const cameraEl = document.getElementById("mainCam");

AFRAME.registerComponent('boss-logic', {
  init: function () {
    this.timer = 0;
    this.phaseTimer = 0;
    this.angleOffset = 0;
    this.dir = 1;
  },
  tick: function (t, dt) {
    this.timer += dt;
    this.phaseTimer += dt;

    // Movimiento lateral del jefe (Más rápido)
    const pos = this.el.object3D.position;
    pos.x += this.dir * 0.08;
    if (Math.abs(pos.x) > 7) this.dir *= -1;

    // Cambiar modo cada 4 segundos
    if (this.phaseTimer > 4000) {
      attackMode = (attackMode + 1) % 5; // Ahora 5 patrones
      this.phaseTimer = 0;
      const nombres = ["ANILLOS DOBLES", "ASPAS CRUZADAS", "CAZA PESADA", "LLUVIA DE CAOS", "MURO TOTAL"];
      modeTextEl.textContent = "FASE: " + nombres[attackMode];
    }

    // DISPAROS SEGÚN FASE
    if (this.timer > (attackMode === 1 ? 80 : 450)) { // La espiral es mucho más rápida
      this.executeAttack();
      this.timer = 0;
    }

    if (bossHP > 0) {
        bossHP -= 0.07;
        healthBarEl.style.width = bossHP + "%";
    }
  },

  executeAttack: function() {
    const pPos = new THREE.Vector3();
    cameraEl.object3D.getWorldPosition(pPos);
    const bPos = this.el.object3D.position;
    const toPlayer = Math.atan2(pPos.x - bPos.x, pPos.z - bPos.z);

    switch(attackMode) {
      case 0: // Anillos dobles
        this.shootRing(14, 0.2, "#ff0055");
        break;
      case 1: // Aspas cruzadas (Espirales opuestas)
        this.angleOffset += 0.6;
        this.createBullet(this.angleOffset, 0.25, "#00ffff");
        this.createBullet(-this.angleOffset, 0.25, "#00ffff");
        break;
      case 2: // Caza pesada (Abanico al jugador)
        for(let i = -2; i <= 2; i++) this.createBullet(toPlayer + (i * 0.2), 0.3, "#ffeb3b");
        break;
      case 3: // Lluvia (Balas que salen a los lados y cierran)
        this.createBullet(toPlayer + 1.5, 0.2, "#ffffff");
        this.createBullet(toPlayer - 1.5, 0.2, "#ffffff");
        break;
      case 4: // Muro (Casi todo el ancho)
        for(let i = 0; i < 8; i++) this.createBullet((i*0.4) + toPlayer - 1.5, 0.15, "#ff5722");
        break;
    }
  },

  shootRing: function (count, speed, color) {
    for (let i = 0; i < count; i++) {
      this.createBullet(i * (Math.PI * 2 / count), speed, color);
    }
  },

  createBullet: function (angle, speed, color) {
    const bullet = document.createElement('a-sphere');
    bullet.setAttribute('radius', 0.45); 
    bullet.setAttribute('color', color);
    bullet.setAttribute('material', 'emissive', color);
    bullet.setAttribute('material', 'emissiveIntensity', 2);
    bullet.setAttribute('position', {x: this.el.object3D.position.x, y: 1.1, z: this.el.object3D.position.z});
    
    bullet.setAttribute('bullet-move', {
      vx: Math.sin(angle) * speed,
      vz: Math.cos(angle) * speed
    });
    this.el.sceneEl.appendChild(bullet);
  }
});

AFRAME.registerComponent('bullet-move', {
  schema: { vx: {type: 'number'}, vz: {type: 'number'} },
  init: function() { this.pVec = new THREE.Vector3(); this.bVec = new THREE.Vector3(); },
  tick: function (time, dt) {
    const pos = this.el.object3D.position;
    pos.x += this.data.vx * (dt / 16);
    pos.z += this.data.vz * (dt / 16);
    cameraEl.object3D.getWorldPosition(this.pVec);
    this.el.object3D.getWorldPosition(this.bVec);

    const distXZ = Math.sqrt(Math.pow(this.pVec.x - this.bVec.x, 2) + Math.pow(this.pVec.z - this.bVec.z, 2));

    if (distXZ < 0.85 && !isInvincible && Math.abs(this.pVec.y - this.bVec.y) < 1.3) {
       takeDamage();
    }
    if (this.bVec.distanceTo(this.pVec) > 40) {
      if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
    }
  }
});

function takeDamage() {
  if (isInvincible) return;
  playerHP--;
  isInvincible = true;
  let hearts = "";
  for(let i=0; i<playerHP; i++) hearts += "❤️ ";
  playerLifeEl.textContent = hearts || "MUERTE";

  document.body.style.filter = "contrast(200%) brightness(50%) sepia(100%) hue-rotate(-50deg)";
  setTimeout(() => { document.body.style.filter = "none"; }, 150)

  if (playerHP <= 0) {
    setTimeout(() => { alert("FIN DE LA PARTIDA"); location.reload(); }, 100);
  } else {
    setTimeout(() => { isInvincible = false; }, 600); // Casi sin invulnerabilidad
  }
}
</script>
</body>
</html>
