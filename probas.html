<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LoopTrauma - Sala Boss</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    /* ===== HUD ===== */
    #hud {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
      font-family: 'Share Tech Mono', monospace;
    }

    /* Scanlines */
    #hud::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
    }

    /* Vignette */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 998;
    }

    /* Boss name banner */
    #boss-banner {
      position: absolute;
      bottom: 120px; left: 50%; transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
    }
    #boss-banner.visible { opacity: 1; }
    #boss-title {
      font-family: 'Cinzel', serif; 
      font-size: 2.2em;
      font-weight: 900;
      color: #d4af37;
      text-shadow: 0 0 30px rgba(212,175,55,0.8), 0 2px 4px rgba(0,0,0,0.9);
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* Boss HP bar */
    #boss-hp-wrap {
      position: absolute;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      width: 600px; max-width: 90vw;
      text-align: center;
    }
    .hp-bar-bg {
      width: 100%; height: 14px;
      background: rgba(30,10,0,0.85);
      border: 1px solid #d4af37;
      box-shadow: 0 0 18px rgba(212,175,55,0.35);
    }
    #bossBar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #8b0000, #cc2200, #ff4400);
      transition: width 0.15s ease;
    }

    /* Player HP */
    #player-hp-wrap { position: absolute; top: 28px; left: 32px; }
    #playerLife {
      font-family: 'Cinzel', serif; font-size: 1.6em;
      color: #ff4444; text-shadow: 0 0 12px rgba(255,0,0,0.7);
    }
    .player-bar-bg { width: 180px; height: 10px; background: rgba(30,0,0,0.7); border: 1px solid rgba(255,0,0,0.4); margin-top: 6px; }
    #playerBar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff0000, #880000); }

    /* Phase mode */
    #modeText {
      position: absolute; top: 28px; right: 32px;
      font-family: 'Cinzel', serif; color: #d4af37;
      text-align: right; text-transform: uppercase;
    }

    /* Damage flash */
    #damage-flash {
      position: fixed; inset: 0; background: rgba(180,0,0,0);
      pointer-events: none; z-index: 1001; transition: background 0.08s ease;
    }
    #damage-flash.hit { background: rgba(180,0,0,0.35); }

    /* End screen */
    #endScreen {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 2000;
      flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; color: #d4af37; text-align: center;
    }
    #endScreen.show { display: flex; }
    #endTitle { font-size: 3.5em; font-weight: 900; letter-spacing: 8px; animation: breathe 2s infinite; }
    #endBtn {
      margin-top: 48px; padding: 14px 48px;
      border: 1px solid #d4af37; background: transparent;
      color: #d4af37; font-family: 'Cinzel', serif;
      cursor: pointer; transition: 0.3s;
    }
    #endBtn:hover { background: #d4af37; color: #000; }

    @keyframes breathe {
      0%, 100% { text-shadow: 0 0 30px rgba(212,175,55,0.6); }
      50% { text-shadow: 0 0 60px rgba(212,175,55,1); }
    }
  </style>
</head>
<body>

<div id="vignette"></div>
<div id="damage-flash"></div>

<div id="hud">
  <div id="player-hp-wrap">
    <div id="playerLife">❤ ❤ ❤</div>
    <div class="player-bar-bg"><div id="playerBar"></div></div>
  </div>

  <div id="modeText"><span>FASE ACTUAL</span><br>ANIQUILACIÓ</div>

  <div id="boss-hp-wrap">
    <div style="color:#d4af37; font-family:'Cinzel'; font-size:0.8em; margin-bottom:5px;">CORRUPCIÓ</div>
    <div class="hp-bar-bg"><div id="bossBar"></div></div>
  </div>

  <div id="boss-banner">
    <div id="boss-title">CORRUPCIÓ</div>
  </div>
</div>

<div id="endScreen">
  <div id="endTitle">HAS MORT</div>
  <div id="endSub" style="letter-spacing: 5px; margin-top: 10px;">EL FOC S'APAGA</div>
  <button id="endBtn" onclick="location.reload()">TORNAR A INTENTAR</button>
</div>

<a-assets>
  <img id="fons" src="IMG/lonod.jpg">
  <audio id="musicaFondo" src="musica/DS3.mp3" preload="auto"></audio>
  <a-asset-item id="londo" src="modelos/anor_londo.glb"></a-asset-item>
  <a-asset-item id="bossModel" src="modelos/boos.glb"></a-asset-item>
</a-assets>

<a-scene background="color: #06080a" fog="type: linear; color: #06080a; near: 8; far: 50">
  <a-light type="ambient" color="#1a1010" intensity="1.2"></a-light>
  <a-light type="point" color="#ff2200" intensity="3" position="0 4 -18" distance="30"></a-light>

  <a-sky src="#fons" radius="1400" rotation="0 -90 0"></a-sky>

  <a-entity gltf-model="#londo" position="-2550 -1430.4 -5525" rotation="0 90 0" scale="10 10 10"></a-entity>
  <a-plane rotation="-90 0 0" width="50" height="50" position="0 0 -10" color="#0a0806"></a-plane>

  <a-entity id="player" position="0 0 7">
    <a-camera id="mainCam" wasd-controls="acceleration: 80" look-controls="pointerLockEnabled: true">
      <a-cursor color="#d4af37"></a-cursor>
    </a-camera>
  </a-entity>

  <a-entity id="boss" position="0 0 -18" boss-logic>
    <a-entity id="bossGLB" gltf-model="#bossModel" scale="2 2 2" rotation="0 180 0"></a-entity>
    <a-light type="point" color="#ff4400" intensity="4" distance="12"></a-light>
  </a-entity>
</a-scene>

<script>
  let bossHP = 100;
  let playerHP = 3;
  let isInvincible = false;
  let attackMode = 0;
  let bossAlive = true;

  const bossBarEl = document.getElementById("bossBar");
  const playerBarEl = document.getElementById("playerBar");
  const playerLifeEl = document.getElementById("playerLife");
  const endScreen = document.getElementById("endScreen");
  const endTitle = document.getElementById("endTitle");
  const endSub = document.getElementById("endSub");
  const endBtn = document.getElementById("endBtn");
  const damageFlash = document.getElementById("damage-flash");
  const cameraEl = document.getElementById("mainCam");

  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('boss-banner').classList.add('visible');
      setTimeout(() => document.getElementById('boss-banner').classList.remove('visible'), 3000);
    }, 1000);
  });

  AFRAME.registerComponent('boss-logic', {
    init: function () {
      this.timer = 0;
      this.phaseTimer = 0;
      this.dir = 1;
    },
    tick: function (t, dt) {
      if (!bossAlive) return;
      this.timer += dt;
      this.phaseTimer += dt;

      const pos = this.el.object3D.position;
      pos.x += this.dir * 0.08 * (dt / 16);
      if (Math.abs(pos.x) > 10) this.dir *= -1;

      if (this.phaseTimer > 4000) {
        attackMode = (attackMode + 1) % 5;
        this.phaseTimer = 0;
        const noms = ["ANELLS DOBLES", "ESPIRAL BLAU", "CAÇA GROGA", "PLUJA CAOS", "MUR DE FOC"];
        document.getElementById("modeText").innerHTML = `<span>FASE ACTUAL</span><br>${noms[attackMode]}`;
      }

      if (this.timer > (attackMode === 1 ? 100 : 450)) {
        this.executeAttack();
        this.timer = 0;
      }

      if (bossHP > 0) {
        bossHP -= 0.04 * (dt / 16);
        bossBarEl.style.width = Math.max(0, bossHP) + "%";
        if (bossHP <= 0) this.onBossDie();
      }
    },
    executeAttack: function () {
      const pPos = new THREE.Vector3();
      cameraEl.object3D.getWorldPosition(pPos);
      const bPos = this.el.object3D.position;
      const angleToPlayer = Math.atan2(pPos.x - bPos.x, pPos.z - bPos.z);

      switch (attackMode) {
        case 0: this.shootRing(12, 0.2, "#ff0044"); break;
        case 1: this.createBullet(Math.random() * 6.28, 0.25, "#00fbff"); break;
        case 2: for(let i=-2; i<=2; i++) this.createBullet(angleToPlayer + i*0.2, 0.3, "#fffb00"); break;
        case 3: this.createBullet(angleToPlayer + (Math.random()-0.5), 0.2, "#ffffff"); break;
        case 4: for(let i=0; i<8; i++) this.createBullet(angleToPlayer - 1 + i*0.25, 0.15, "#ff6200"); break;
      }
    },
    shootRing: function (count, speed, color) {
      for (let i = 0; i < count; i++) this.createBullet(i * (6.28 / count), speed, color);
    },
    /* --- AQUÍ EL COLOR FOSFORESCENTE --- */
    createBullet: function (angle, speed, color) {
      const bullet = document.createElement('a-sphere');
      bullet.setAttribute('radius', '0.35');
      // Material con shader plano y emisión para que brille (fosforescente)
      bullet.setAttribute('material', `shader: flat; color: ${color}; emissive: ${color}; emissiveIntensity: 2`);
      bullet.setAttribute('position', { x: this.el.object3D.position.x, y: 1.2, z: this.el.object3D.position.z });
      bullet.setAttribute('bullet-move', { vx: Math.sin(angle) * speed, vz: Math.cos(angle) * speed });
      this.el.sceneEl.appendChild(bullet);
    },
    onBossDie: function () {
      bossAlive = false;
      const gltf = document.getElementById('bossGLB');
      if (gltf) gltf.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 1000');
      setTimeout(() => {
        endTitle.textContent = "VICTÒRIA";
        endSub.textContent = "HAS DERROTAT LA CORRUPCIÓ";
        endBtn.textContent = "CONTINUAR";
        endBtn.onclick = () => window.location.href = 'Bosque.html';
        endScreen.classList.add('show');
      }, 1200);
    }
  });

  AFRAME.registerComponent('bullet-move', {
    schema: { vx: { type: 'number' }, vz: { type: 'number' } },
    init: function () { this.pVec = new THREE.Vector3(); this.bVec = new THREE.Vector3(); },
    tick: function (time, dt) {
      if (!bossAlive) { if (this.el.parentNode) this.el.parentNode.removeChild(this.el); return; }
      const pos = this.el.object3D.position;
      pos.x += this.data.vx * (dt / 16);
      pos.z += this.data.vz * (dt / 16);
      cameraEl.object3D.getWorldPosition(this.pVec);
      this.el.object3D.getWorldPosition(this.bVec);
      const dist = Math.hypot(this.pVec.x - this.bVec.x, this.pVec.z - this.bVec.z);
      if (dist < 0.8 && !isInvincible) {
        takeDamage();
        if (this.el.parentNode) this.el.parentNode.removeChild(this.el);
      }
      if (this.bVec.distanceTo(this.pVec) > 50) { if (this.el.parentNode) this.el.parentNode.removeChild(this.el); }
    }
  });

  function takeDamage() {
    if (isInvincible || !bossAlive) return;
    playerHP--;
    isInvincible = true;
    let hearts = "";
    for (let i = 0; i < playerHP; i++) hearts += "❤ ";
    playerLifeEl.textContent = hearts || "✝";
    playerBarEl.style.width = (playerHP / 3 * 100) + "%";
    damageFlash.classList.add('hit');
    setTimeout(() => damageFlash.classList.remove('hit'), 150);

    if (playerHP <= 0) {
      endTitle.textContent = "HAS MORT";
      endBtn.textContent = "TORNAR A INTENTAR";
      endBtn.onclick = () => location.reload();
      endScreen.classList.add('show');
    } else {
      setTimeout(() => isInvincible = false, 800);
    }
  }
</script>
</body>
</html>
